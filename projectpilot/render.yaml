## ProjectPilot — Render Deployment Configuration
## Hans Infomatic Pvt. Ltd.
## Deploy: Connect GitHub repo → Render → New Blueprint → select this file

services:
  # ── Backend API ─────────────────────────────────────────────
  - type: web
    name: projectpilot-api
    runtime: node
    region: singapore  # closest to India
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run db:migrate && npm run db:seed
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: projectpilot-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGINS
        sync: false  # Set manually after frontend deploys: https://projectpilot-ui.onrender.com

  # ── Frontend ─────────────────────────────────────────────────
  - type: web
    name: projectpilot-ui
    runtime: static
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: projectpilot-api
          type: web
          property: host
          envVarKey: RENDER_EXTERNAL_URL

# ── PostgreSQL Database ────────────────────────────────────────
databases:
  - name: projectpilot-db
    region: singapore
    plan: free
    databaseName: projectpilot
    user: pp_admin
